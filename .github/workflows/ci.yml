name: CI

"on":
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Web tests
        run: pnpm --filter web test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python tests
        run: |
          python - <<'PY'
          import sys
          import unittest

          suite = unittest.defaultTestLoader.discover('.')
          total = suite.countTestCases()
          print(f"Discovered {total} Python unittest test case(s).")

          if total == 0:
              print("No Python unittests discovered; treating as pass for this baseline repository state.")
              sys.exit(0)

          result = unittest.TextTestRunner(verbosity=2).run(suite)
          sys.exit(0 if result.wasSuccessful() else 1)
          PY
