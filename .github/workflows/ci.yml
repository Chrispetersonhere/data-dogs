name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Web tests
        run: pnpm --filter web test

      - name: Python tests
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            services/ingest-sec/tests \
            services/parse-xbrl/tests \
            services/parse-proxy/tests \
            services/id-master/tests \
            services/market-data/tests
          do
            if [ -d "$path" ]; then
              pytest "$path" -q
            else
              echo "Skipping $path (directory not present in this repo snapshot)."
            fi
          done
