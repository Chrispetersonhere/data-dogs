name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Web tests
        run: pnpm --filter web test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f services/ingest-sec/requirements.txt ]; then
            python -m pip install -r services/ingest-sec/requirements.txt
          else
            python -m pip install pytest
          fi

      - name: Run Python service tests when present
        shell: bash
        run: |
          set -euo pipefail

          if [ -d services/ingest-sec/tests ]; then
            echo "Running python -m pytest services/ingest-sec/tests -q"
            PYTHONPATH="services/ingest-sec" python -m pytest services/ingest-sec/tests -q
          else
            echo "Skipping services/ingest-sec/tests (directory not present in this repository snapshot)"
          fi

          if [ -d services/parse-xbrl/tests ]; then
            echo "Running python -m pytest services/parse-xbrl/tests -q"
            PYTHONPATH="services/parse-xbrl" python -m pytest services/parse-xbrl/tests -q
          else
            echo "Skipping services/parse-xbrl/tests (directory not present in this repository snapshot)"
          fi

          if [ -d services/parse-proxy/tests ]; then
            echo "Running python -m pytest services/parse-proxy/tests -q"
            PYTHONPATH="services/parse-proxy" python -m pytest services/parse-proxy/tests -q
          else
            echo "Skipping services/parse-proxy/tests (directory not present in this repository snapshot)"
          fi

          if [ -d services/id-master/tests ]; then
            echo "Running python -m pytest services/id-master/tests -q"
            PYTHONPATH="services/id-master" python -m pytest services/id-master/tests -q
          else
            echo "Skipping services/id-master/tests (directory not present in this repository snapshot)"
          fi

          if [ -d services/market-data/tests ]; then
            echo "Running python -m pytest services/market-data/tests -q"
            PYTHONPATH="services/market-data" python -m pytest services/market-data/tests -q
          else
            echo "Skipping services/market-data/tests (directory not present in this repository snapshot)"
          fi
