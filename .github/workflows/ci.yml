name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python test runner
        run: python -m pip install --upgrade pip pytest

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Web tests
        run: pnpm --filter web test

      - name: Python tests
        shell: bash
        run: |
          set -euo pipefail
          test_paths=(
            "services/ingest-sec/tests"
            "services/parse-xbrl/tests"
            "services/parse-proxy/tests"
            "services/id-master/tests"
            "services/market-data/tests"
          )

          for path in "${test_paths[@]}"; do
            if [[ -d "$path" ]]; then
              echo "Running pytest $path -q"
              pytest "$path" -q
            else
              echo "Skipping missing test path: $path"
            fi
          done
