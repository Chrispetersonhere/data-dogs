name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Web tests
        run: pnpm --filter web test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test runner
        run: python -m pip install --upgrade pip pytest

      - name: Run Python service tests when present
        shell: bash
        run: |
          set -euo pipefail

          run_if_present() {
            local test_dir="$1"
            if [ -d "$test_dir" ]; then
              echo "Running python -m pytest $test_dir -q"
              python -m pytest "$test_dir" -q
            else
              echo "Skipping $test_dir (directory not present in this repository snapshot)"
            fi
          }

          run_if_present services/ingest-sec/tests
          run_if_present services/parse-xbrl/tests
          run_if_present services/parse-proxy/tests
          run_if_present services/id-master/tests
          run_if_present services/market-data/tests
