name: data-dogs-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: data-dogs-postgres
    environment:
      POSTGRES_DB: data_dogs
      POSTGRES_USER: data_dogs
      POSTGRES_PASSWORD: data_dogs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_dogs -d data_dogs"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: data-dogs-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  object-storage:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: data-dogs-object-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - object_storage_data:/data

  web:
    image: node:20-bookworm-slim
    container_name: data-dogs-web
    working_dir: /workspace
    command: >-
      bash -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter web dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ../..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      object-storage:
        condition: service_started

  ingest-sec:
    image: python:3.12-slim
    container_name: data-dogs-ingest-sec
    working_dir: /workspace
    command: >-
      bash -lc "python -m http.server 8081"
    ports:
      - "8081:8081"
    volumes:
      - ../..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      object-storage:
        condition: service_started

volumes:
  postgres_data:
  clickhouse_data:
  object_storage_data:
